<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">YummyKodik logo</title>
  <desc id="desc">Rounded blue badge with YK monogram, cyan play-shaped Y and orange skip-shaped K accent.</desc>
  <defs>
